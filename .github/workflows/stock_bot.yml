name: GVR Stock Bot

on:
  schedule:
    # Thứ 2–6, 9:00–15:15 ICT (UTC+7) = 02:00–08:15 UTC
    # Chạy mỗi 5 phút
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 2,3,4,5,6,7 * * 1-5"
    - cron: "0,5,10 8 * * 1-5"   # 15:00–15:10 ICT

  workflow_dispatch:  # Chạy thủ công bất kỳ lúc nào

jobs:
  send-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (one shot)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOL: GVR
        run: python bot.py --once
